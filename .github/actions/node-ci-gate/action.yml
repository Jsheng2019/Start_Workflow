# =============================================================================
# Hello Printer — 最简复合操作 (Composite Action) Demo
# =============================================================================
# 演示复合操作的核心语法: inputs / outputs / 多 step 编排。
# 三个 step 分别打印不同文本，最后汇总一个 greeting 输出给调用方。
# =============================================================================

name: Hello Printer
description: 一个简单的教学 demo，用多个 step 打印问候语

inputs:
  name:
    description: '要打招呼的人名'
    required: false
    default: 'World'

outputs:
  greeting:
    description: '组装好的完整问候语'
    value: ${{ steps.assemble.outputs.greeting }}

runs:
  using: composite
  steps:
    - name: Step 1 — 打个招呼
      shell: bash
      run: echo "👋 Hello, ${{ inputs.name }}! (from composite action step 1)"

    - name: Step 2 — 再来一句
      shell: bash
      run: echo "📅 Today is $(date +%Y-%m-%d) (from composite action step 2)"

    - name: Step 3 — 组装输出
      id: assemble
      shell: bash
      run: |
        GREETING="Hello, ${{ inputs.name }}! Have a nice day. 🎉"
        echo "greeting=$GREETING" >> "$GITHUB_OUTPUT"
        echo "📤 Output ready: $GREETING (from composite action step 3)"
