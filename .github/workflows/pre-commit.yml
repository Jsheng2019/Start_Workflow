# =============================================================================
# Pre-commit Checks — 代码门禁
# =============================================================================
# 在 PR 和 push 时自动运行 pre-commit，检查代码规范。
# pre-commit 是一个多语言 git hook 管理工具，本 workflow 在 CI 中执行
# 所有钩子确保代码质量基线不被破坏。
#
# 钩子来源：.pre-commit-config.yaml（项目根目录）
# 钩子详情：docs/workflow-lab/workflow-3-pre-commit.md
# =============================================================================

name: Pre-commit Checks

# ---------------------------------------------------------------------------
# Triggers
# ---------------------------------------------------------------------------
# push + pull_request: 每次推送和 PR 都运行，确保门禁生效
# workflow_dispatch: 手动触发，用于测试
# ---------------------------------------------------------------------------
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

# ---------------------------------------------------------------------------
# Permissions
# ---------------------------------------------------------------------------
permissions:
  contents: read

# ---------------------------------------------------------------------------
# Concurrency
# ---------------------------------------------------------------------------
# 同一分支的多次 push 只保留最新一次，节约 CI 资源
# ---------------------------------------------------------------------------
concurrency:
  group: pre-commit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # setup-python 安装 Python，pre-commit 依赖 Python 运行
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 缓存 ~/.cache/pre-commit 目录加速后续运行
      # key 包含 Python 版本 + .pre-commit-config.yaml 的 hash
      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit|${{ env.pythonLocation }}|${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit|${{ env.pythonLocation }}
            pre-commit

      - name: Install pre-commit
        run: pip install pre-commit

      # pre-commit run --all-files 对所有文件运行全部钩子
      # 不等价于 install（install 只对 git diff 中的文件运行）
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure --color=always
