# =============================================================================
# PyTorch Community Nightly Build — REAL Source Compilation
# =============================================================================
# An authentic reproduction of PyTorch's community nightly binary build
# pipeline. This workflow ACTUALLY compiles PyTorch from C++ source code
# inside pytorch/manylinux2_28-builder containers — the same images used
# by PyTorch's own CI infrastructure.
#
# What this does:
#   1. Clones pytorch/pytorch (shallow, depth=1)
#   2. Compiles 3000+ C++ source files into libtorch + torch._C
#   3. Packages the result as a PEP 440 manylinux wheel (~200 MB)
#   4. Smoke-tests the wheel: import torch, tensor ops, CUDA check
#   5. Uploads the wheel as a build artifact
#
# Build time: 2–4 hours on standard runner (ubuntu-latest, 2 cores)
# Wheel size:  ~180–220 MB (CPU-only, Release)
#
# References:
#   - pytorch/pytorch: .github/workflows/generated-linux-binary-manywheel-nightly.yml
#   - pytorch/pytorch: .github/workflows/_binary-build-linux.yml
#   - pytorch/pytorch: .ci/pytorch/build.sh
#   - pytorch/builder:   manywheel/build.sh
# =============================================================================

name: PyTorch Community Nightly Build

# ---------------------------------------------------------------------------
# Triggers
# ---------------------------------------------------------------------------
# schedule:             Daily at 17:07 UTC (01:07 Beijing — true "nightly")
# workflow_dispatch:    Manual trigger with configurable matrix inputs
# ---------------------------------------------------------------------------
on:
  schedule:
    # PyTorch nightly runs daily. Offset to minute 7 avoids the :00
    # thundering-herd on GitHub's cron scheduler.
    - cron: '7 17 * * *'
  workflow_dispatch:
    inputs:
      python-versions:
        description: 'Python versions (space-separated, e.g. "3.10 3.12")'
        required: false
        type: string
        default: '3.12'
      cuda-versions:
        description: 'CUDA variants (cpu only on free runner; cu* needs GPU runner)'
        required: false
        type: string
        default: 'cpu'
      package-type:
        description: 'Package type'
        required: false
        type: choice
        options:
          - manywheel
          - wheel
        default: manywheel
      max-jobs:
        description: 'MAX_JOBS compile parallelism (lower=less RAM)'
        required: false
        type: choice
        options:
          - '2'
          - '4'
          - '6'
          - '8'
          - '12'
        default: '2'
      runner:
        description: 'GitHub Actions runner size (larger = faster, needs paid plan)'
        required: false
        type: choice
        options:
          - ubuntu-latest
          - ubuntu-latest-4
          - ubuntu-latest-8
          - ubuntu-latest-16
        default: ubuntu-latest
      pytorch-ref:
        description: 'PyTorch git ref (branch, tag, or commit SHA)'
        required: false
        type: string
        default: 'main'

# ---------------------------------------------------------------------------
# Permissions
# ---------------------------------------------------------------------------
permissions:
  contents: read
  packages: write

# ---------------------------------------------------------------------------
# Concurrency
# ---------------------------------------------------------------------------
concurrency:
  group: pytorch-nightly-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'schedule' }}

# ---------------------------------------------------------------------------
# Global environment (PyTorch CI convention)
# ---------------------------------------------------------------------------
env:
  BUILD_ENVIRONMENT: linux-binary-manywheel
  PACKAGE_TYPE: ${{ inputs.package-type || 'manywheel' }}
  MAX_JOBS: ${{ inputs.max-jobs || '2' }}
  PYTORCH_REF: ${{ inputs.pytorch-ref || 'main' }}

jobs:

# ===========================================================================
# Job 1: generate-matrix — Dynamic Build Matrix
# ===========================================================================
# Runs a Python script that produces the build matrix as JSON.
# This mirrors PyTorch's tools/scripts/generate_binary_build_matrix.py.
#
# Default matrix (standard free runner):
#   Python 3.12 × CPU = 1 entry, ~2–4 hour build
#
# Expanded matrix (workflow_dispatch, larger runner):
#   Python 3.10 3.11 3.12 3.13 × CPU cu124 cu126 = up to 12 entries
# ===========================================================================
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      build-matrix: ${{ steps.generate.outputs.build-matrix }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate build matrix
        id: generate
        run: |
          MATRIX=$(python3 .github/scripts/generate_nightly_matrix.py \
            --python-versions "${{ inputs.python-versions || '3.12' }}" \
            --cuda-versions "${{ inputs.cuda-versions || 'cpu' }}" \
            --package-type "${{ inputs.package-type || 'manywheel' }}")

          COUNT=$(echo "$MATRIX" | python3 -c 'import json,sys;print(len(json.load(sys.stdin)["include"]))')
          echo "Generated ${COUNT} build configurations"

          {
            echo 'build-matrix<<MATRIX_EOF'
            echo "$MATRIX"
            echo 'MATRIX_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Print matrix summary
        run: |
          python3 .github/scripts/generate_nightly_matrix.py \
            --python-versions "${{ inputs.python-versions || '3.12' }}" \
            --cuda-versions "${{ inputs.cuda-versions || 'cpu' }}" \
            >> "$GITHUB_STEP_SUMMARY"

# ===========================================================================
# Job 2: build — REAL PyTorch Compilation (Matrix)
# ===========================================================================
# Each matrix entry compiles PyTorch from source inside a manylinux builder
# container. This is a REAL C++ compilation — 3000+ translation units.
#
# Environment variables follow PyTorch CI conventions exactly:
#   DESIRED_PYTHON  → selects /opt/python/cpXY-cpXY/bin/python
#   DESIRED_CUDA    → selects cpu/cu124/cu126 build variant
#   MAX_JOBS        → limits parallel compilation (2 for 7 GB runner)
#
# Real PyTorch CI uses linux.12xlarge runners (72 vCPU, 144 GB).
# We default to ubuntu-latest (2 vCPU, 7 GB RAM). Use ubuntu-latest-4
# or larger via workflow_dispatch → runner input if you have a paid plan.
# ===========================================================================
  build:
    needs: generate-matrix
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.build-matrix) }}
      fail-fast: false
    timeout-minutes: 360

    container:
      image: ${{ matrix.container }}

    env:
      DESIRED_PYTHON: ${{ matrix.python_version }}
      DESIRED_CUDA: ${{ matrix.cuda_version }}
      MAX_JOBS: ${{ inputs.max-jobs || '2' }}

    steps:
      # ---- Checkout workflow repo (for build script) ----
      - uses: actions/checkout@v4

      # ---- Restore ccache from previous runs ----
      # Ccache dramatically speeds up re-compilation when source files
      # haven't changed. The PyTorch builder image has ccache pre-installed.
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ./.ccache
          key: pytorch-ccache-${{ matrix.python_version }}-${{ matrix.cuda_version }}-${{ hashFiles('.github/workflows/pytorch-nightly.yml') }}
          restore-keys: |
            pytorch-ccache-${{ matrix.python_version }}-${{ matrix.cuda_version }}-
            pytorch-ccache-${{ matrix.python_version }}-

      # ---- BUILD ----
      - name: Build PyTorch wheel (${{ matrix.build_name }})
        run: bash scripts/build_wheel.sh

      # ---- Upload wheel artifact ----
      # Real PyTorch CI uploads to S3/R2. We use GitHub Artifacts
      # as the equivalent storage layer.
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.build_name }}
          path: ./pytorch-src/dist/*.whl
          if-no-files-found: error
          retention-days: 7

      # ---- Save ccache for next run ----
      # Uses ./.ccache (relative to GITHUB_WORKSPACE) so the host runner
      # can cache what the container wrote. The build script exports
      # CCACHE_DIR=${GITHUB_WORKSPACE}/.ccache for the same reason.
      - name: Save ccache
        if: always()
        uses: actions/cache@v4
        with:
          path: ./.ccache
          key: pytorch-ccache-${{ matrix.python_version }}-${{ matrix.cuda_version }}-${{ hashFiles('.github/workflows/pytorch-nightly.yml') }}

# ===========================================================================
# Job 3: test — Smoke-Test the Built Wheel (Matrix)
# ===========================================================================
# Downloads the wheel, installs it in a clean Python environment,
# and runs real PyTorch operations to verify the build is functional.
#
# Tests performed:
#   1. import torch — verifies the C extension loaded
#   2. torch.__version__ — verifies version metadata
#   3. torch.cuda.is_available() — verifies CUDA status matches build
#   4. torch.randn + torch.mm — verifies core tensor ops work
#   5. torch.nn.Linear forward pass — verifies autograd + nn modules
#
# This mirrors the test phase of PyTorch's _binary-test-linux.yml,
# which runs the full PyTorch test suite. We run a focused smoke test
# because the full suite takes 4+ hours on GPU runners.
# ===========================================================================
  test:
    needs: [generate-matrix, build]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.build-matrix) }}
      fail-fast: false
    timeout-minutes: 15

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.build_name }}
          path: dist/

      - name: List wheels
        run: ls -lh dist/

      - name: Install PyTorch wheel
        run: |
          pip install dist/*.whl
          pip install pytest numpy

      - name: Smoke test — import and basic ops
        run: |
          python3 << 'PYEOF'
          import sys, os

          print("=== PyTorch Smoke Test ===")

          # 1. Import — verifies the C extension (_C.so) loaded
          import torch
          print(f"torch imported OK")

          # 2. Version — verifies build metadata
          print(f"version:      {torch.__version__}")
          assert torch.__version__ is not None
          assert "dev" in torch.__version__ or len(torch.__version__) > 0

          # 3. CUDA status — must match build variant
          cuda_available = torch.cuda.is_available()
          expected_cuda = "${{ matrix.cuda_version }}" != "cpu"
          print(f"cuda:         {cuda_available} (expected: {expected_cuda})")
          assert cuda_available == expected_cuda, \
              f"CUDA mismatch: build=${{ matrix.cuda_version }}, runtime={cuda_available}"

          # 4. Core tensor ops — verifies the C++ math library works
          x = torch.randn(100, 100)
          y = torch.mm(x, x.t())
          print(f"tensor ops:   OK (matmul 100x100)")

          # 5. Autograd — verifies the autograd engine works
          w = torch.randn(10, 10, requires_grad=True)
          loss = (w ** 2).sum()
          loss.backward()
          assert w.grad is not None
          print(f"autograd:     OK (grad shape: {w.grad.shape})")

          # 6. nn.Module — verifies the neural network layer works
          linear = torch.nn.Linear(10, 5)
          out = linear(torch.randn(3, 10))
          assert out.shape == (3, 5), f"Expected (3,5), got {out.shape}"
          print(f"nn.Module:    OK (Linear 10→5, batch=3)")

          # 7. Serialization — verifies state_dict works
          import io
          buf = io.BytesIO()
          torch.save(linear.state_dict(), buf)
          buf.seek(0)
          loaded = torch.load(buf)
          print(f"serialize:    OK")

          # 8. CPU info
          print(f"cpu count:    {torch.get_num_threads()}")
          print(f"mkl available:{torch.backends.mkl.is_available() if hasattr(torch.backends, 'mkl') else 'N/A'}")

          print()
          print("=== ALL SMOKE TESTS PASSED ===")
          PYEOF

      - name: Test summary
        if: always()
        run: |
          echo "### Smoke Test: ${{ matrix.build_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Python:** ${{ matrix.python_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **CUDA:** ${{ matrix.cuda_display }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"

# ===========================================================================
# Job 4: summary — Nightly Build Report
# ===========================================================================
# Aggregates results from all build and test jobs into a markdown report.
# Uses always() so it runs even when some variants failed — you get a
# complete picture of the nightly build status.
# ===========================================================================
  summary:
    needs: [generate-matrix, build, test]
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate nightly report
        run: |
          python3 .github/scripts/generate_nightly_matrix.py \
            --python-versions "${{ inputs.python-versions || '3.12' }}" \
            --cuda-versions "${{ inputs.cuda-versions || 'cpu' }}" \
            > /tmp/matrix.json

          TOTAL=$(python3 -c 'import json;print(len(json.load(open("/tmp/matrix.json"))["include"]))')

          {
            echo "# PyTorch Community Nightly Build Report"
            echo ""
            echo "**Date:** $(date -u +'%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "## Pipeline Status"
            echo ""
            echo "| Stage | Variants | Status |"
            echo "|-------|----------|--------|"
            echo "| Generate Matrix | 1 | ${{ needs.generate-matrix.result }} |"
            echo "| Build | ${TOTAL} | ${{ needs.build.result }} |"
            echo "| Test  | ${TOTAL} | ${{ needs.test.result }} |"
            echo ""
            echo "## Build Configurations"
            echo ""
            echo "| Build Name | Python | CUDA | Container |"
            echo "|-----------|--------|------|-----------|"
            for entry in $(python3 -c "
          import json
          for e in json.load(open('/tmp/matrix.json'))['include']:
              print(f\"{e['build_name']}|{e['python_version']}|{e['cuda_display']}|{e['container'].split('/')[-1]}\")
          "); do
              IFS='|' read -r name py cuda img <<< "$entry"
              echo "| \`$name\` | $py | $cuda | \`$img\` |"
            done
            echo ""
            echo "## Trigger"
            echo ""
            echo "- **Event:** ${{ github.event_name }}"
            echo "- **Schedule:** ${{ github.event_name == 'schedule' && 'Daily 17:07 UTC' || 'Manual' }}"
            echo "- **PyTorch ref:** \`${{ inputs.pytorch-ref || 'main' }}\`"
            echo "- **MAX_JOBS:** \`${{ inputs.max-jobs || '2' }}\`"
            echo ""
            echo "## Notes"
            echo ""
            echo "- This is a **real** PyTorch source compilation — not a mock or demo"
            echo "- Build uses \`pytorch/manylinux2_28-builder\` — the same images as PyTorch CI"
            echo "- Build time: 2–4 hours on standard runner (PyTorch CI uses 72-core runners)"
            echo "- Full pipeline: [pytorch/pytorch](https://github.com/pytorch/pytorch/actions)"
            echo "- ccache is enabled for faster re-builds"
          } >> "$GITHUB_STEP_SUMMARY"
