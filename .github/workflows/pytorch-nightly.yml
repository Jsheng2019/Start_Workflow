# =============================================================================
# PyTorch Community Nightly Build
# =============================================================================
# A faithful reproduction of PyTorch's community nightly binary build pipeline.
# Demonstrates matrix-driven multi-variant wheel building with Docker containers,
# mirroring the real PyTorch workflow structure:
#
#   generate_binary_build_matrix → build (per variant) → test → upload/summary
#
# Key concepts demonstrated:
#   - Dynamic build matrix generation (Python script)
#   - Matrix strategy across Python versions × CUDA variants
#   - Docker-based builds using manylinux containers
#   - C extension wheel compilation and packaging
#   - Artifact pass-through between build and test stages
#   - Environment-driven build configuration (DESIRED_PYTHON, DESIRED_CUDA)
#   - Scheduled nightly runs + manual workflow_dispatch
#
# References:
#   - pytorch/pytorch: .github/workflows/generated-linux-binary-manywheel-nightly.yml
#   - pytorch/pytorch: .github/workflows/_binary-build-linux.yml
#   - pytorch/builder: manywheel/build.sh
# =============================================================================

name: PyTorch Community Nightly Build

# ---------------------------------------------------------------------------
# Triggers
# ---------------------------------------------------------------------------
# schedule:             Daily at 05:00 UTC (mimics PyTorch nightly cadence)
# workflow_dispatch:    Manual trigger with configurable inputs
# ---------------------------------------------------------------------------
on:
  schedule:
    # PyTorch nightly builds run daily; we offset by 7 min to avoid
    # the :00/:30 thundering-herd on GitHub's scheduler
    - cron: '7 5 * * *'
  workflow_dispatch:
    inputs:
      # -------------------------------------------------------------------
      # python-versions: Space-separated list of target Python versions
      # In production PyTorch, this spans 3.10–3.15 (8 versions)
      # -------------------------------------------------------------------
      python-versions:
        description: 'Python versions (space-separated)'
        required: false
        type: string
        default: '3.10 3.11 3.12 3.13'
      # -------------------------------------------------------------------
      # cuda-versions: Space-separated list of CUDA variants
      # In production PyTorch: cpu cu126 cu130 cu132 (+ rocm + xpu)
      # -------------------------------------------------------------------
      cuda-versions:
        description: 'CUDA variants (space-separated, e.g. cpu cu124)'
        required: false
        type: string
        default: 'cpu cu124'
      # -------------------------------------------------------------------
      # package-type: Package type (manywheel | wheel | libtorch)
      # -------------------------------------------------------------------
      package-type:
        description: 'Package type'
        required: false
        type: choice
        options:
          - manywheel
          - wheel
        default: manywheel
      # -------------------------------------------------------------------
      # keep-artifacts: Retain build artifacts beyond default retention
      # -------------------------------------------------------------------
      keep-artifacts:
        description: 'Keep artifacts for 90 days (instead of 7)'
        required: false
        type: boolean
        default: false

# ---------------------------------------------------------------------------
# Permissions
# ---------------------------------------------------------------------------
permissions:
  contents: read
  packages: write

# ---------------------------------------------------------------------------
# Concurrency
# ---------------------------------------------------------------------------
# Cancel in-progress nightly runs for the same ref; manual triggers
# always run to completion (different group per dispatch)
# ---------------------------------------------------------------------------
concurrency:
  group: pytorch-nightly-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'schedule' }}

# ---------------------------------------------------------------------------
# Environment — shared across all jobs (matching PyTorch convention)
# ---------------------------------------------------------------------------
env:
  BUILD_ENVIRONMENT: linux-binary-manywheel
  PACKAGE_TYPE: ${{ inputs.package-type || 'manywheel' }}
  BINARY_ENV_FILE: /tmp/env
  PYTORCH_FINAL_PACKAGE_DIR: /artifacts

jobs:

# ===========================================================================
# Job 1: generate-matrix — Dynamic Build Matrix Generation
# ===========================================================================
# Purpose: Runs a Python script that produces the build matrix as JSON.
# This mirrors PyTorch's generate_binary_build_matrix.py approach.
#
# Why dynamic generation:
#   - Matrix size varies with Python × CUDA combinations (up to 32+ entries)
#   - Different channels (nightly/test/release) have different configs
#   - Avoids hardcoding 100+ lines of matrix entries in YAML
#   - Matrix can be customized via workflow_dispatch inputs
# ===========================================================================
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      # The build-matrix output is consumed by downstream jobs via
      # ${{ fromJson(needs.generate-matrix.outputs.build-matrix) }}
      build-matrix: ${{ steps.generate.outputs.build-matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate build matrix
        id: generate
        run: |
          MATRIX=$(python .github/scripts/generate_nightly_matrix.py \
            --python-versions "${{ inputs.python-versions || '3.10 3.11 3.12 3.13' }}" \
            --cuda-versions "${{ inputs.cuda-versions || 'cpu cu124' }}" \
            --package-type "${{ inputs.package-type || 'manywheel' }}")

          echo "Generated $(echo "$MATRIX" | python -c 'import json,sys; d=json.load(sys.stdin); print(len(d["include"]))') build configurations"

          # Use a delimiter to safely pass multi-line JSON as output
          {
            echo 'build-matrix<<EOF'
            echo "$MATRIX"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Print build matrix summary
        run: |
          echo "## Build Matrix" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          python .github/scripts/generate_nightly_matrix.py \
            --python-versions "${{ inputs.python-versions || '3.10 3.11 3.12 3.13' }}" \
            --cuda-versions "${{ inputs.cuda-versions || 'cpu cu124' }}" \
            --package-type "${{ inputs.package-type || 'manywheel' }}" \
            >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

# ===========================================================================
# Job 2: build — Build wheels in manylinux Docker containers (Matrix)
# ===========================================================================
# Purpose: Build one wheel per (Python version, CUDA variant) combination.
# Each matrix entry runs in a dedicated manylinux container, mirroring
# how PyTorch uses pytorch/manylinux2_28-builder images.
#
# Key design decisions:
#   - container: directive places ALL steps inside the manylinux image
#   - DESIRED_PYTHON + DESIRED_CUDA env vars drive the build script
#   - Each variant produces a uniquely named artifact for downstream testing
#   - fail-fast: false — one failing variant doesn't cancel others
#
# In the real PyTorch pipeline, this job:
#   - Compiles 100+ C/C++/CUDA source files
#   - Links against cuDNN, NCCL, BLAS, MKL
#   - Uses 12xlarge runners with 280-min timeouts
#   - Produces ~200MB wheels
# ===========================================================================
  build:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.build-matrix) }}
      fail-fast: false
    timeout-minutes: 30

    # Each variant runs inside a manylinux container — this is the same
    # pattern used by PyTorch's _binary-build-linux.yml when
    # use_container_directive is true
    container:
      image: ${{ matrix.container }}

    env:
      DESIRED_PYTHON: ${{ matrix.python_version }}
      DESIRED_CUDA: ${{ matrix.cuda_version }}
      GPU_ARCH_TYPE: ${{ matrix.cuda_version == 'cpu' && 'cpu' || 'cuda' }}
      GPU_ARCH_VERSION: ${{ matrix.cuda_display }}

    steps:
      - uses: actions/checkout@v4

      # Populate binary env — mimics .ci/pytorch/binary_populate_env.sh
      - name: Populate binary environment
        run: |
          echo "DESIRED_PYTHON=${DESIRED_PYTHON}" >> "${BINARY_ENV_FILE}"
          echo "DESIRED_CUDA=${DESIRED_CUDA}" >> "${BINARY_ENV_FILE}"
          echo "PACKAGE_TYPE=${PACKAGE_TYPE}" >> "${BINARY_ENV_FILE}"
          echo "BUILD_ENVIRONMENT=${BUILD_ENVIRONMENT}" >> "${BINARY_ENV_FILE}"
          echo "GPU_ARCH_TYPE=${GPU_ARCH_TYPE}" >> "${BINARY_ENV_FILE}"
          echo "GPU_ARCH_VERSION=${GPU_ARCH_VERSION}" >> "${BINARY_ENV_FILE}"
          mkdir -p "${PYTORCH_FINAL_PACKAGE_DIR}"

      # Build the wheel using manylinux Python
      # Mirrors: .ci/manywheel/build.sh
      - name: Build ${{ matrix.package_type }} wheel
        run: bash scripts/build_wheel.sh

      # Upload the wheel as a build artifact
      # In production, wheels go to S3/R2 instead of GitHub Artifacts
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.build_name }}
          path: demo-pytorch/dist/*.whl
          if-no-files-found: error
          retention-days: ${{ inputs.keep-artifacts == 'true' && 90 || 7 }}

      # Write build summary
      - name: Build summary
        if: always()
        run: |
          echo "### ${{ matrix.build_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Python:** ${{ matrix.python_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **CUDA:** ${{ matrix.cuda_display }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Container:** ${{ matrix.container }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"

# ===========================================================================
# Job 3: test — Download & Test Wheels (Matrix)
# ===========================================================================
# Purpose: For each build variant, download the wheel artifact, install it,
# and run the test suite. This mirrors PyTorch's _binary-test-linux.yml.
#
# Key design:
#   - Test job runs on the bare runner (not in a container), so it can
#     freely install and test the wheel in a clean environment
#   - Each variant is tested independently (per Python version)
#   - Test results are collected even on failure for debugging
#
# In the real PyTorch pipeline, the test matrix is even larger:
#   - GPU variants run on g4dn.xlarge (NVIDIA T4) or ROCm runners
#   - Tests include full op parity checks against reference implementations
#   - Timeout is 240+ minutes per variant
# ===========================================================================
  test:
    needs: [generate-matrix, build]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.build-matrix) }}
      fail-fast: false
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.build_name }}
          path: dist/

      - name: List downloaded artifacts
        run: ls -lh dist/

      - name: Install wheel
        run: |
          pip install --find-links=dist/ torch_demo
          pip install pytest

      - name: Run tests
        run: python -m pytest demo-pytorch/tests/ -v --tb=short

      - name: Verify build metadata
        run: |
          python -c "
          import torch_demo
          info = torch_demo.get_build_info()
          print(f'Version:       {info[\"version\"]}')
          print(f'CUDA variant:  {info[\"cuda_variant\"]}')
          print(f'Python:        {info[\"python_version\"]}')
          print(f'CUDA avail:    {info[\"cuda_available\"]}')
          assert info['cuda_variant'] == '${{ matrix.cuda_version }}', \
              f'Expected ${{ matrix.cuda_version }}, got {info[\"cuda_variant\"]}'
          print('Build metadata verified OK')
          "

      - name: Test summary
        if: always()
        run: |
          echo "### Test: ${{ matrix.build_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Python:** ${{ matrix.python_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **CUDA:** ${{ matrix.cuda_display }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"

# ===========================================================================
# Job 4: summary — Aggregate Results & Report
# ===========================================================================
# Purpose: Collect results from all build and test jobs, produce a unified
# summary. Mirrors PyTorch's pattern of having a final consolidation job.
#
# Uses always() conditional so it runs even when some builds fail,
# providing a complete picture of the nightly build status.
# ===========================================================================
  summary:
    needs: [generate-matrix, build, test]
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate nightly report
        run: |
          python .github/scripts/generate_nightly_matrix.py \
            --python-versions "${{ inputs.python-versions || '3.10 3.11 3.12 3.13' }}" \
            --cuda-versions "${{ inputs.cuda-versions || 'cpu cu124' }}" \
            --package-type "${{ inputs.package-type || 'manywheel' }}" \
            > /tmp/matrix.json

          TOTAL=$(python -c 'import json; print(len(json.load(open("/tmp/matrix.json"))["include"]))')

          {
            echo "# PyTorch Community Nightly Build — $(date -u +'%Y-%m-%d')"
            echo ""
            echo "## Pipeline Status"
            echo ""
            echo "| Stage | Status |"
            echo "|-------|--------|"
            echo "| Generate Matrix | ${{ needs.generate-matrix.result }} |"
            echo "| Build ($TOTAL variants) | ${{ needs.build.result }} |"
            echo "| Test ($TOTAL variants) | ${{ needs.test.result }} |"
            echo ""
            echo "## Build Configurations ($TOTAL total)"
            echo ""
            echo "| Build Name | Python | CUDA | Container |"
            echo "|-----------|--------|------|-----------|"
            for entry in $(python -c '
          import json
          for e in json.load(open("/tmp/matrix.json"))["include"]:
              print(f"{e[\"build_name\"]}|{e[\"python_version\"]}|{e[\"cuda_display\"]}|{e[\"container\"]}")
          '); do
              IFS='|' read -r name py cuda img <<< "$entry"
              echo "| \`$name\` | $py | $cuda | \`${img##*/}\` |"
            done
            echo ""
            echo "## Trigger"
            echo ""
            echo "- **Event:** ${{ github.event_name }}"
            echo "- **Schedule:** ${{ github.event_name == 'schedule' && 'Daily 05:07 UTC' || 'Manual (workflow_dispatch)' }}"
            echo "- **Package type:** ${{ inputs.package-type || 'manywheel' }}"
            echo ""
            echo "## Notes"
            echo ""
            echo "- This is a **demo** of PyTorch's community nightly build pipeline"
            echo "- Real pipeline uses \`pytorch/manylinux2_28-builder\` images with CUDA toolkits"
            echo "- Real pipeline uploads to AWS S3 / Cloudflare R2, not GitHub Artifacts"
            echo "- Full pipeline: [pytorch/pytorch](https://github.com/pytorch/pytorch/blob/main/.github/workflows/generated-linux-binary-manywheel-nightly.yml)"
          } >> "$GITHUB_STEP_SUMMARY"
