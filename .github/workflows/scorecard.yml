name: OpenSSF Scorecard

on:
  push:
    branches: [main, master]
  schedule:
    - cron: '30 8 * * 1'
  workflow_dispatch:

jobs:
  scorecard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.json
          results_format: json
          publish_results: false

      - name: Print results to step summary
        run: |
          cat <<'PYEOF' > /tmp/format_results.py
          import json

          RISK_EMOJI = {"Critical": "🔴", "High": "🟠", "Medium": "🟡", "Low": "🟢"}

          with open("results.json") as f:
              data = json.load(f)

          print("## OpenSSF Scorecard Results")
          print()
          print(f"**Aggregate Score: {data.get('score', 'N/A')} / 10**")
          print(f"Date: {data.get('date', 'N/A')}")
          print()

          checks = data.get("checks", [])
          if checks:
              print("| Check | Score | Risk |")
              print("|-------|-------|------|")
              total, count = 0, 0
              for c in checks:
                  name = c.get("name", "?")
                  score = c.get("score", None)
                  risk = c.get("risk", "?")
                  emoji = RISK_EMOJI.get(risk, "⚪")
                  s = str(score) if score is not None and score >= 0 else "N/A"
                  print(f"| {name} | {s} | {emoji} {risk} |")
                  if score is not None and score >= 0:
                      total += score
                      count += 1
              if count:
                  avg = total / count
                  print()
                  print(f"**Average: {avg:.1f}/10** across {count} checks")

          print()
          print("[📖 View Guide](https://scorecard.dev/) · [🔧 Fix Low Scores](https://github.com/ossf/scorecard#remediation)")
          PYEOF
          python3 /tmp/format_results.py >> $GITHUB_STEP_SUMMARY

      - name: Log results to console
        run: cat results.json
