name: OpenSSF Scorecard

on:
  push:
    branches: [main, master]
  schedule:
    - cron: '30 8 * * 1'
  workflow_dispatch:

jobs:
  scorecard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install scorecard CLI
        run: |
          curl -sSLO "https://github.com/ossf/scorecard/releases/download/v5.5.0/scorecard_5.5.0_linux_amd64.tar.gz"
          tar xzf scorecard_5.5.0_linux_amd64.tar.gz
          chmod +x scorecard
          ./scorecard --version

      - name: Run scorecard (local analysis)
        run: |
          ./scorecard --local=. --format=json --show-details > results.json
          echo "=== Scorecard Results ==="
          python3 -c "
          import json
          with open('results.json') as f:
              data = json.load(f)
          print(f'Aggregate score: {data.get(\"score\", \"N/A\")}')
          print(f'Date: {data.get(\"date\", \"N/A\")}')
          print()
          for check in data.get('checks', []):
              name = check.get('name', '?')
              score = check.get('score', '?')
              risk = check.get('risk', '?')
              doc = check.get('documentation', {}).get('short', '')[:100]
              print(f'{name:<40}  Score: {str(score):>5}  Risk: {str(risk):>8}')
          "
