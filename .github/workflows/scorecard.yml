name: OpenSSF Scorecard

on:
  push:
    branches: [main, master]
  schedule:
    - cron: '30 8 * * 1'
  workflow_dispatch:

jobs:
  scorecard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.json
          results_format: json
          publish_results: false

      - name: Print results
        run: |
          echo '## Scorecard Results' >> $GITHUB_STEP_SUMMARY
          python3 -c "
          import json
          with open('results.json') as f:
              data = json.load(f)
          print(f'Aggregate score: {data.get(\"score\", \"N/A\")}')
          for check in data.get('checks', []):
              name = check.get('name', '?')
              score = check.get('score', '?')
              print(f'{name}: {score}/10')
          " >> $GITHUB_STEP_SUMMARY
