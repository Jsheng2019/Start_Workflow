name: OpenSSF Scorecard

on:
  push:
    branches: [main, master]
  schedule:
    - cron: '30 8 * * 1'
  workflow_dispatch:

jobs:
  scorecard:
    runs-on: ubuntu-latest
    env:
      GITHUB_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install scorecard CLI
        run: |
          set -ex
          curl -sSL -H "Authorization: Bearer $GITHUB_AUTH_TOKEN" \
            "https://api.github.com/repos/ossf/scorecard/releases/latest" \
            -o release.json
          cat release.json | python3 -c "import json,sys; assets=json.load(sys.stdin)['assets']; print([a['browser_download_url'] for a in assets if 'linux_amd64' in a['name']][0])" > dl_url.txt
          curl -sSL "$(cat dl_url.txt)" -o scorecard.tar.gz
          tar xzf scorecard.tar.gz
          chmod +x scorecard
          ./scorecard --version

      - name: Run scorecard (local analysis)
        run: |
          ./scorecard --local=. --format=json --show-details > results.json
          echo "=== Scorecard Results ==="
          python3 -c "
          import json
          with open('results.json') as f:
              data = json.load(f)
          print(f'Aggregate score: {data.get(\"score\", \"N/A\")}')
          print(f'Date: {data.get(\"date\", \"N/A\")}')
          print()
          for check in data.get('checks', []):
              name = check.get('name', '?')
              score = check.get('score', '?')
              risk = check.get('risk', '?')
              doc = check.get('documentation', {}).get('short', '')[:100]
              print(f'{name:<40}  Score: {str(score):>5}  Risk: {str(risk):>8}')
          "
