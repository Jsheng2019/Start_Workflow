name: Test Probe 2

on:
  push:
    branches: [main]
  pull_request:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  calc:
    runs-on: ubuntu-latest
    outputs:
      dep-key: ${{ steps.c.outputs.dkey }}
    steps:
      - uses: actions/checkout@v4
      - id: c
        run: |
          echo "dkey=npm-${{ hashFiles('package-lock.json') }}" >> "$GITHUB_OUTPUT"
          echo "bkey=build-${{ hashFiles('src/**/*.ts', 'tsconfig.json') }}" >> "$GITHUB_OUTPUT"

  consumer:
    needs: calc
    runs-on: ubuntu-latest
    steps:
      - run: echo ${{ needs.calc.outputs['dep-key'] }}
