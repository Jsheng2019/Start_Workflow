name: Test Probe 3

on:
  push:
    branches: [main]

jobs:
  calc:
    runs-on: ubuntu-latest
    outputs:
      mykey: ${{ steps.c.outputs.key }}
    steps:
      - uses: actions/checkout@v4
      - id: c
        run: echo "key=npm-${{ hashFiles('package-lock.json') }}" >> "$GITHUB_OUTPUT"

  restore-test:
    needs: calc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: ${{ needs.calc.outputs.mykey }}
          restore-keys: |
            npm-cache-
      - run: echo "Restored with key: ${{ needs.calc.outputs.mykey }}"
