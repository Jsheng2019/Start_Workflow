name: Test Debug 3

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  first:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.gen.outputs.value }}
    steps:
      - id: gen
        run: echo "value=success" >> "$GITHUB_OUTPUT"

  second:
    needs: first
    runs-on: ubuntu-latest
    steps:
      - run: echo "Got: ${{ needs.first.outputs.result }}"
