# =============================================================================
# Demo: Composite Action — Hello Printer
# =============================================================================
# 演示复合操作的最简用法: 定义一个 action，在主 workflow 中引用。
# =============================================================================

name: Demo - Composite Action

on: workflow_dispatch

jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 调用本地复合操作
      - name: Run hello printer
        id: hello
        uses: ./.github/actions/node-ci-gate
        with:
          name: 'GitHub Actions'

      # 消费复合操作的输出
      - name: Show output
        run: |
          echo "Composite action returned: ${{ steps.hello.outputs.greeting }}"
